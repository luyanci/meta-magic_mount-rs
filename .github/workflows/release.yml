name: release-build
on:
  push:
    tags:
      - "v*.*.*"
env:
  CARGO_TERM_COLOR: always
jobs:
  release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          add-to-path: true
          local-cache: true
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          targets: aarch64-linux-android
          components: rust-src
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          run_install: false
          package_json_file: webui/package.json
      - name: Setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "lts/*"
          cache: pnpm
          package-manager-cache: false
          cache-dependency-path: webui/pnpm-lock.yaml
      - name: Install build dependencies
        run: |
          cargo install cargo-ndk --locked
      - name: Setup Webui deps
        run: |
          cd webui/
          pnpm install --frozen-lockfile
      - name: Build
        run: |
          cargo xtask build -t arm64
          cargo xtask build -t armv7
          cargo xtask build -t universal
      - name: Install git-cliff
        run: |
          cargo install --git https://github.com/orhun/git-cliff
      - name: Generate Changelog
        run: |
          PROP_FILE="module/module.prop"
          VERSION=$(grep "^version=" "$PROP_FILE" | cut -d= -f2 | sed 's/-.*//')
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          git-cliff "$PREV_TAG".."$VERSION" -o /tmp/changelog.md
      - name: Create Release with GitHub CLI
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/changelog.md \
            --draft=false \
            --prerelease=false \
            output/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
